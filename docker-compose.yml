services:
  db:
    image: postgres:16-alpine
    container_name: insurance-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-insurance}
      POSTGRES_USER: ${POSTGRES_USER:-insurance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insurance}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insurance} -d ${POSTGRES_DB:-insurance}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insurance-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-insurance};Username=${POSTGRES_USER:-insurance};Password=${POSTGRES_PASSWORD:-insurance}"
    ports:
      - "${API_PORT:-8080}:8080"

volumes:
  pgdata:
